<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SmoothGPT</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <span class="logo">SmoothGPT</span>
      <span id="status" class="status">…</span>
    </header>

    <dl class="stats">
      <div class="row">
        <dt>Turns in conversation</dt>
        <dd id="total">—</dd>
      </div>
      <div class="row">
        <dt>Virtualised</dt>
        <dd id="contained">—</dd>
      </div>
      <div class="row">
        <dt>Rendered live</dt>
        <dd id="rendered">—</dd>
      </div>
    </dl>

    <label class="toggle">
      <span>Enabled</span>
      <input type="checkbox" id="toggle" />
      <span class="track"><span class="thumb"></span></span>
    </label>

    <p id="hint" class="hint"></p>

    <script src="popup.js"></script>
  </body>
</html>
